version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: postgres-marinetraffic
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=marinetraffic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d marinetraffic"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: marinetraffic-scraper
    depends_on:
      db:
        condition: service_healthy
    environment:
      - API_KEY=715ac72120c93dffc9e09022e49e16ea14921b4d
    command: python scraper.py


  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: fastapi-service
    depends_on:
      - db
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  streamlit:
    build:
      context: .
      dockerfile: streamlit/Dockerfile
    container_name: streamlit-dashboard
    depends_on:
      - api
    command: streamlit run dashboard.py --server.port=8501
    ports:
      - "8501:8501"

volumes:
  pgdata: